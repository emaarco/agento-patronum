name: "\U0001F6E1\uFE0F Pattern Suggestion"
description: Propose a new pattern for the default protection list
title: "[Pattern]: "
labels: ["pattern", "enhancement"]
body:
  - type: input
    id: pattern
    attributes:
      label: Pattern
      placeholder: "e.g. ~/.config/gcloud/credentials.db"
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Why should this be a default?
      description: What does this file contain and why is it sensitive?
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Cloud credentials
        - SSH / TLS keys
        - Package manager tokens
        - Shell / environment
        - Database credentials
        - Other
    validations:
      required: true
