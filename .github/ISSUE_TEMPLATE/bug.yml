name: Bug report
description: Report a bug or broken behavior
title: "<Component/Area>: <short description of the broken behavior>"
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Keep the title concise. Example: `patronum-hook: env file not blocked`.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Install plugin via `/plugin install agento-patronum@emaarco`
        2. Add pattern via `/patronum-add ~/.aws/credentials`
        3. Ask Claude to read `~/.aws/credentials`
        4. File is read instead of blocked
    validations:
      required: true

  - type: textarea
    id: current
    attributes:
      label: Current behavior
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: technical
    attributes:
      label: Technical context
      description: "Optional: patronum.json (sanitized), OS, Claude Code version, relevant logs from ~/.claude/patronum.log"
      render: shell
