name: Refactor / Tech Debt
description: Propose internal code restructuring or tech debt reduction
title: "refactor: <what is being restructured and why>"
labels:
  - refactor
body:
  - type: markdown
    attributes:
      value: |
        Example: `refactor: extract pattern-matching logic from patronum-hook.sh into a shared function`.

  - type: textarea
    id: summary
    attributes:
      label: Summary
    validations:
      required: true

  - type: textarea
    id: current-state
    attributes:
      label: Current state
    validations:
      required: true

  - type: textarea
    id: desired-state
    attributes:
      label: Desired state
    validations:
      required: true

  - type: textarea
    id: added-value
    attributes:
      label: Added value
      description: What does this improve? (maintainability, testability, readability)
    validations:
      required: true

  - type: textarea
    id: technical-notes
    attributes:
      label: Technical notes
      description: "Optional: affected scripts, risk areas, migration steps"
