name: Feature / Enhancement
description: Request a new feature or improvement
title: "As a <persona>, I want <goal>"
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        User-story title format. Example: `As a Terraform developer, I want ~/.terraformrc protected by default`.

  - type: textarea
    id: summary
    attributes:
      label: Summary
    validations:
      required: true

  - type: textarea
    id: current-state
    attributes:
      label: Current state
      description: What gap or friction exists today?
    validations:
      required: true

  - type: textarea
    id: desired-state
    attributes:
      label: Desired state
      description: What should the experience look like after this change?
    validations:
      required: true

  - type: textarea
    id: added-value
    attributes:
      label: Added value
      description: Who benefits and how?
    validations:
      required: true

  - type: textarea
    id: technical-notes
    attributes:
      label: Technical notes
      description: "Optional: implementation ideas, related files, constraints"
