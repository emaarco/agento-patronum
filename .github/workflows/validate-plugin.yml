name: Validate Plugin

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate JSON files
        run: node scripts/validate-json.js

      - name: Validate SKILL.md frontmatter
        run: |
          for f in skills/*/SKILL.md; do
            head -10 "$f" | grep -q "^name:" || (echo "$f: missing name" && exit 1)
            head -10 "$f" | grep -q "^description:" || (echo "$f: missing description" && exit 1)
            echo "$f: frontmatter OK"
          done

      - name: Run unit tests
        run: node --test scripts/test/*.test.js

      - name: Run integration self-test
        run: |
          CLAUDE_PLUGIN_ROOT="$(pwd)" node scripts/patronum-setup.js
          CLAUDE_PLUGIN_ROOT="$(pwd)" node scripts/patronum-verify.js
