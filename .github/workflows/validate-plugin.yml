name: Validate Plugin

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate JSON files
        run: |
          node -e "
            const fs = require('fs');
            for (const f of [
              '.claude-plugin/plugin.json',
              'hooks/hooks.json',
              'defaults/patronum.json'
            ]) {
              JSON.parse(fs.readFileSync(f, 'utf8'));
              console.log(f + ': valid');
            }
            console.log('All JSON files valid');
          "

      - name: Check default patterns
        run: |
          COUNT=$(node -e "const d = JSON.parse(require('fs').readFileSync('defaults/patronum.json','utf8')); console.log(d.entries.length)")
          echo "Default patterns: $COUNT"
          [ "$COUNT" -gt 0 ] || (echo "No default patterns found" && exit 1)

      - name: Validate JS scripts
        run: |
          for f in scripts/patronum-*.js; do
            node -e "new (require('vm').Script)(require('fs').readFileSync('$f','utf8'))" && echo "$f: syntax OK"
          done

      - name: Validate SKILL.md frontmatter
        run: |
          for f in skills/*/SKILL.md; do
            head -10 "$f" | grep -q "^name:" || (echo "$f: missing name" && exit 1)
            head -10 "$f" | grep -q "^description:" || (echo "$f: missing description" && exit 1)
            echo "$f: frontmatter OK"
          done

      - name: Run self-test
        run: |
          CLAUDE_PLUGIN_ROOT="$(pwd)" node scripts/patronum-setup.js
          CLAUDE_PLUGIN_ROOT="$(pwd)" node scripts/patronum-verify.js
